<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Malla Curricular Pro - Ingeniería Mecánica UNLZ</title>
  <style>
    /* Variables CSS dinámicas con la paleta de tu imagen por defecto */
    :root {
      --bg-image: url('https://i.pinimg.com/736x/da/6b/19/da6b19742a9bf64674215b6faa5893c9.jpg'); 
      --color-aprobada: #839958;  /* Moss Green */
      --color-regular: #D3968C;   /* Rosy Brown */
      --color-cursando: #105666;  /* Midnight Green */
      --color-crema: #F7F4D5;     /* Beige */
      --color-bloqueada: #1b3d2f; /* Verde Musgo Oscuro pero visible */
      
      /* Colores de texto automáticos según contraste */
      --text-aprobada: #ffffff;
      --text-regular: #ffffff;
      --text-cursando: #ffffff;
      --text-crema: #333333;
      --text-bloqueada: #F7F4D5;  /* Texto crema brillante para leer sobre oscuro */
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg-image) no-repeat center center fixed;
      background-size: cover;
      margin: 0;
      padding: 20px;
      color: #333;
      transition: background 0.3s ease;
    }

    /* Capa de desenfoque grunge/aesthetic sobre el fondo */
    .backdrop-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(10, 51, 35, 0.75); /* Tinte verde oscuro traslúcido para legibilidad */
      backdrop-filter: blur(2px);
      z-index: -1;
    }

    header {
      background: rgba(10, 51, 35, 0.85);
      border: 1px solid rgba(247, 244, 213, 0.2);
      color: var(--color-crema);
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    header h1 { margin: 0; font-size: 1.8rem; font-weight: 700; letter-spacing: -0.5px; }
    
    .filter-container select {
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid var(--color-aprobada);
      background: var(--color-crema);
      color: #0A3323;
      font-weight: bold;
    }

    .top-widgets {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .widget-box {
      background: rgba(255, 255, 255, 0.93);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 1.2rem;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      border-top: 4px solid var(--color-cursando);
    }
    .widget-box h3 { margin-top: 0; color: #0A3323; font-size: 1.1rem; border-bottom: 1px solid #ddd; padding-bottom: 0.5rem;}
    
    /* Calendario Semanal */
    .calendar-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; text-align: center; margin-top: 10px; }
    .calendar-day {
      background: rgba(247, 244, 213, 0.6);
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 8px 4px;
      font-size: 0.75rem;
      min-height: 60px;
    }
    .calendar-day.active {
      background: var(--color-cursando);
      border-color: var(--color-cursando);
      color: var(--text-cursando);
      font-weight: bold;
    }
    .day-name { font-weight: bold; border-bottom: 1px solid rgba(0,0,0,0.1); margin-bottom: 4px; }
    .calendar-mat { font-size: 0.7rem; margin-top: 2px; background: rgba(255,255,255,0.3); border-radius: 3px; padding: 1px; }

    .layout-container { display: flex; gap: 1.5rem; align-items: flex-start; margin-top: 10px; }
    .malla-container { flex: 3; display: flex; flex-direction: column; gap: 1.5rem; }
    .cuatrimestre { display: flex; flex-wrap: wrap; gap: 1.2rem; width: 100%; }
    
    .cuatri-col {
      min-width: 290px;
      background: rgba(10, 51, 35, 0.85);
      border: 1px solid rgba(247, 244, 213, 0.25);
      border-radius: 12px;
      padding: 1.2rem;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      flex: 1;
    }
    .cuatri-title {
      color: var(--color-crema);
      text-align: center;
      font-size: 1.05rem;
      margin-bottom: 1.2rem;
      font-weight: bold;
      border-bottom: 1px dashed rgba(247, 244, 213, 0.3);
      padding-bottom: 0.4rem;
    }
    
    /* Estilos dinámicos de tarjetas */
    .materia {
      padding: 0.85rem;
      border: 2px solid rgba(247, 244, 213, 0.1);
      border-radius: 8px;
      margin-bottom: 0.8rem;
      cursor: pointer;
      position: relative;
      transition: all 0.2s ease;
      font-size: 0.85rem;
      font-weight: 600;
      user-select: none;
      box-shadow: 0 4px 6px rgba(0,0,0,0.15);
    }
    .materia:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0,0,0,0.3);
      border-color: var(--color-crema);
    }
    
    .materia.estado-aprobada { background-color: var(--color-aprobada) !important; color: var(--text-aprobada) !important; }
    .materia.estado-regular { background-color: var(--color-regular) !important; color: var(--text-regular) !important; }
    .materia.estado-cursando { background-color: var(--color-cursando) !important; color: var(--text-cursando) !important; }
    .materia.estado-crema { background-color: var(--color-crema) !important; color: var(--text-crema) !important; }
    .materia.estado-bloqueada { background-color: var(--color-bloqueada) !important; color: var(--text-bloqueada) !important; }

    .materia.highlight-missing { border-color: #e74c3c !important; box-shadow: 0 0 12px #e74c3c !important; opacity: 1 !important; }
    .materia.highlight-ok { border-color: #2ecc71 !important; box-shadow: 0 0 12px #2ecc71 !important; opacity: 1 !important; }
    .materia.dimmed { opacity: 0.15; }

    .materia-meta { display: flex; justify-content: space-between; opacity: 0.75; margin-top: 6px; font-size: 0.75rem; }
    .nota-badge { position: absolute; top: -8px; right: -5px; background-color: #2ecc71; color: white; font-size: 0.75rem; padding: 2px 6px; border-radius: 10px; font-weight: bold; }
    
    /* Paneles laterales */
    .sidebar-wrapper {
      flex: 1;
      min-width: 320px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      position: sticky;
      top: 20px;
    }
    .sidebar-panel {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border: 2px solid #0A3323;
      border-radius: 12px;
      padding: 1.2rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }
    .sidebar-panel h3 { margin: 0 0 10px 0; color: #0A3323; border-bottom: 2px solid #0A3323; padding-bottom: 0.5rem; }
    
    /* Tabla Analítica */
    .stats-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-top: 5px; }
    .stats-table td { padding: 8px 4px; border-bottom: 1px solid #eee; color: #333; }
    .stats-table td:last-child { text-align: right; font-weight: bold; color: #105666; }

    .form-group { margin-top: 12px; display: flex; flex-direction: column; gap: 4px; }
    .form-group select, .form-group input { padding: 8px; border: 1px solid #ccc; border-radius: 6px; }
    
    .add-day-row { display: flex; gap: 5px; margin-top: 5px; }
